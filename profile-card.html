<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10 bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-lg p-8 max-w-sm w-full text-center">
      <div class="w-16 h-16 bg-blue-100 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl">
        👤
      </div>
      <h2 id="name"  class="text-xl font-bold text-gray-800"></h2>
      <p  id="role"  class="text-blue-500 text-sm mt-1"></p>
      <p  id="email" class="text-gray-400 text-sm mt-1"></p>
    </div>

    <script>
      const person = {
        name:  "Amara Okonkwo",
        role:  "Frontend Developer",
        email: "amara@example.com"
      };

      // YOUR CODE HERE
      // 1. Select #name, #role, and #email
      // 2. Set each element's textContent using the person object above
      const name = document.querySelector("#name");
      const role = document.querySelector("#role");
      const email = document.querySelector("#email");
      name.textContent = person.name;
      role.textContent = person.role;
      email.textContent = person.email;

    </script>

  </body>
</html>
