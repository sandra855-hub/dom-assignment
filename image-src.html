<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <img
      id="photo"
      src="https://picsum.photos/seed/old/300/200"
      alt="Old image"
      class="rounded-xl shadow mb-3"
    />

    <p id="caption" class="text-gray-500 text-sm">This is the old image</p>

    <script>
      // YOUR CODE HERE
      // 1. Select the image by id
      // 2. Change its src to "https://picsum.photos/seed/new/300/200"
      // 3. Change its alt attribute to "New image"
      // 4. Select the caption and change its textContent to "This is the new image"
const image = document.querySelector("#photo");
image.src = "https://picsum.photos/seed/new/300/200";
image.alt = "New image";
const caption = document.querySelector("#caption");
caption.textContent = "This is the new image"
    </script>

  </body>
</html>
