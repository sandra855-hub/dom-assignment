<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <div
      id="colorBox"
      class="w-40 h-40 rounded-2xl bg-gray-300"
    ></div>

    <script>
      // YOUR CODE HERE
      // 1. Select the div by id
      // 2. Remove "bg-gray-300" from its classList
      // 3. Add "bg-blue-500" to its classList
      const colorBox = document.querySelector("#colorBox");
      colorBox.classList.remove("bg-gray-300");
      colorBox.classList.add("bg-blue-500");
    </script>

  </body>
</html>
